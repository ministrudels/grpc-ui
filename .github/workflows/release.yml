name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" &>/dev/null; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  create-release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | head -1)
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > notes.md
          else
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > notes.md
          fi
          gh release create "v${VERSION}" \
            --repo ${{ github.repository }} \
            --title "v${VERSION}" \
            --notes-file notes.md

  build:
    needs: [check, create-release]
    if: needs.check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --${{ matrix.platform }}

  update-cask:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download arm64 DMG and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release download "v$VERSION" \
            --repo ministrudels/grpc-ui \
            --pattern "*arm64.dmg" \
            --dir /tmp
          echo "SHA256=$(sha256sum /tmp/*arm64.dmg | awk '{print $1}')" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Push updated cask to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://github.com/ministrudels/homebrew-tap.git
          cd homebrew-tap
          git remote set-url origin https://x-access-token:${TAP_TOKEN}@github.com/ministrudels/homebrew-tap.git
          mkdir -p Casks
          cat > Casks/grpc-ui.rb << 'CASK'
          cask "grpc-ui" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/ministrudels/grpc-ui/releases/download/v#{version}/gRPC-UI-#{version}-arm64.dmg",
                verified: "github.com/ministrudels/grpc-ui/"

            name "gRPC UI"
            desc "Desktop gRPC client — like Insomnia/Postman for gRPC"
            homepage "https://github.com/ministrudels/grpc-ui"

            app "gRPC UI.app"
          end
          CASK
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" Casks/grpc-ui.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" Casks/grpc-ui.rb
          git config user.email "ganhuanmin@gmail.com"
          git config user.name "github-actions[bot]"
          git add Casks/grpc-ui.rb
          git commit -m "Update grpc-ui to v${VERSION}"
          git push
