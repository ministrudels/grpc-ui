<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grpc-ui</title>
    <style>
      :root {
        --bg-base: #1a1a1a;
        --bg-surface: #141414;
        --bg-raised: #1e1e2e;
        --bg-element: #2d2d2d;
        --bg-hover: #242424;
        --bg-element-hover: #3a3a3a;
        --border: #2d2d2d;
        --border-raised: #45475a;
        --border-overlay: #313244;
        --text-primary: #e2e2e2;
        --text-secondary: #686868;
        --text-service: #aaaaaa;
        --text-overlay: #a6adc8;
        --text-bright: #cdd6f4;
        --text-method: #f0f0f0;
        --text-field-label: #9a9a9a;
        --text-placeholder: #4a4a4a;
        --text-on-accent: #1a1a1a;
        --scrollbar-thumb: #3a3a3a;
        --scrollbar-thumb-hover: #4a4a4a;
        --accent-blue: #89b4fa;
        --accent-red: #f38ba8;
        --accent-red-hover: #f5a0b5;
        --accent-green: #a6e3a1;
        --accent-purple: #cba6f7;
        --accent-orange: #fab387;
        --sidebar-overlay-bg: rgba(26, 26, 26, 0.85);
        --dialog-overlay-bg: rgba(0, 0, 0, 0.6);
        --error-bg: rgba(243, 139, 168, 0.1);
        --error-border: rgba(243, 139, 168, 0.25);
        --badge-unary-bg: rgba(166, 227, 161, 0.15);
        --badge-server-bg: rgba(137, 180, 250, 0.15);
        --badge-client-bg: rgba(250, 179, 135, 0.15);
        --badge-bidi-bg: rgba(203, 166, 247, 0.15);
      }

      [data-theme="light"] {
        --bg-base: #eff1f5;
        --bg-surface: #e6e9ef;
        --bg-raised: #dce0e8;
        --bg-element: #ccd0da;
        --bg-hover: #dce0e8;
        --bg-element-hover: #bcc0cc;
        --border: #ccd0da;
        --border-raised: #9ca0b0;
        --border-overlay: #bcc0cc;
        --text-primary: #4c4f69;
        --text-secondary: #8c8fa1;
        --text-service: #6c6f85;
        --text-overlay: #6c6f85;
        --text-bright: #4c4f69;
        --text-method: #4c4f69;
        --text-field-label: #6c6f85;
        --text-placeholder: #9ca0b0;
        --text-on-accent: #eff1f5;
        --scrollbar-thumb: #bcc0cc;
        --scrollbar-thumb-hover: #acb0be;
        --accent-blue: #1e66f5;
        --accent-red: #d20f39;
        --accent-red-hover: #e64560;
        --accent-green: #40a02b;
        --accent-purple: #8839ef;
        --accent-orange: #fe640b;
        --sidebar-overlay-bg: rgba(239, 241, 245, 0.9);
        --dialog-overlay-bg: rgba(0, 0, 0, 0.4);
        --error-bg: rgba(210, 15, 57, 0.08);
        --error-border: rgba(210, 15, 57, 0.2);
        --badge-unary-bg: rgba(64, 160, 43, 0.15);
        --badge-server-bg: rgba(30, 102, 245, 0.15);
        --badge-client-bg: rgba(254, 100, 11, 0.15);
        --badge-bidi-bg: rgba(136, 57, 239, 0.15);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
